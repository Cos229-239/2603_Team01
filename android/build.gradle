buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Workaround for Gradle 8.13 + react-native-safe-area-context unreadable input error
    tasks.configureEach { task ->
        if (task.name.contains("generateCodegenSchemaFromJavaScript")) {
            task.doNotTrackState("Gradle 8.13 workaround for unreadable inputs")
        }
    }
}
